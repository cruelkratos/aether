<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .session-info {
            padding: 15px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }

        .session-id {
            font-family: monospace;
            background: white;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            border-bottom-left-radius: 0;
            font-size: 13px;
        }

        .tool-call {
            background: #e3f2fd;
            border-left: 4px solid #667eea;
            padding: 10px;
            margin-top: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .tool-call strong {
            color: #667eea;
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-secondary {
            background: #f0f0f0;
            color: #333;
            font-size: 13px;
            padding: 10px 16px;
        }

        .button-secondary:hover {
            background: #e0e0e0;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        @media (max-width: 600px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 95%;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Aether AI Agent</h1>
            <p>Chat with an intelligent agent that can use tools and search the web</p>
        </div>

        <div class="session-info">
            Session ID: <span class="session-id" id="sessionId">Loading...</span>
            <button class="button-secondary" onclick="newSession()" style="float: right; margin-top: -5px;">New Session</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message system">
                <div class="message-content">
                    👋 Welcome to Aether! Ask me anything. I can search the web, query databases, and more!
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-field">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Ask me anything... (press Enter to send)" 
                    onkeypress="handleKeyPress(event)"
                    disabled
                >
                <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
            </div>
            <button class="button-secondary" onclick="clearChat()">Clear</button>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let currentSessionId = null;
        let isLoading = false;

        async function initSession() {
            try {
                const response = await fetch(`${API_BASE}/sessions/create`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });
                const data = await response.json();
                currentSessionId = data.session_id;
                document.getElementById("sessionId").textContent = currentSessionId.substring(0, 12) + "...";
                document.getElementById("userInput").disabled = false;
                document.getElementById("sendBtn").disabled = false;
                addMessage("system", "✓ Session created. Ready to chat!");
            } catch (error) {
                addMessage("system", "❌ Failed to create session: " + error.message);
            }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();

            if (!message || isLoading) return;

            addMessage("user", message);
            input.value = "";

            isLoading = true;
            document.getElementById("sendBtn").disabled = true;
            document.getElementById("userInput").disabled = true;

            addMessage("system", "Thinking...", true);

            try {
                const response = await fetch(`${API_BASE}/sessions/${currentSessionId}/query`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_prompt: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Remove thinking message
                const messages = document.querySelectorAll(".message.system");
                if (messages.length > 0) {
                    messages[messages.length - 1].remove();
                }

                addMessage("assistant", data.result);

                if (data.tool_calls && data.tool_calls.length > 0) {
                    const toolNames = data.tool_calls.map(tc => tc.name || tc.tool || "unknown");
                    const unique = [...new Set(toolNames)];
                    addMessage("system", "Tools used: " + unique.join(", "));
                }
            } catch (error) {
                // Remove thinking message
                const messages = document.querySelectorAll(".message.system");
                if (messages.length > 0) {
                    messages[messages.length - 1].remove();
                }
                addMessage("system", "❌ Error: " + error.message);
            }

            isLoading = false;
            document.getElementById("sendBtn").disabled = false;
            document.getElementById("userInput").disabled = false;
            document.getElementById("userInput").focus();
        }

        function addMessage(role, content, isLoading = false) {
            const chatContainer = document.getElementById("chatContainer");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";

            if (isLoading) {
                contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Waiting for response...</div>';
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter" && !event.shiftKey && !isLoading) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            if (confirm("Clear chat history?")) {
                document.getElementById("chatContainer").innerHTML = `
                    <div class="message system">
                        <div class="message-content">Chat cleared. What would you like to ask?</div>
                    </div>
                `;
            }
        }

        function newSession() {
            if (confirm("Start a new session?")) {
                document.getElementById("chatContainer").innerHTML = `
                    <div class="message system">
                        <div class="message-content">Creating new session...</div>
                    </div>
                `;
                initSession();
            }
        }

        // Initialize on page load
        window.addEventListener("load", initSession);
    </script>
</body>
</html>
