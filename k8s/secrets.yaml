  database-url: "postgresql+asyncpg://aether:CHANGE_ME@aether-postgres.c1234.ng.0001.use1.cache.amazonaws.com:5432/aether_db"
  # OpenAI API key (optional, for cloud deployment)
  openai-api-key: "sk-CHANGE_ME"
  # JWT secret for API auth (optional)
  jwt-secret: "your-secret-key-change-me-in-production"
